<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Display</title>
</head>
<body>

<pre id="code-container"></pre>

<script>
    // Fetch code from GitHub raw URL
    fetch('https://raw.githubusercontent.com/Hugoverissimo21/University-Projects/main/Py%20code_graphs.py')
        .then(response => response.text())
        .then(code => {
            // Insert code into the pre tag
            document.getElementById('code-container').textContent = code;
        })
        .catch(error => {
            console.error('Error fetching code:', error);
        });
</script>

</body>
</html>

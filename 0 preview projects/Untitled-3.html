<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Display</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/themes/prism.min.css">
</head>
<body>

<pre id="code-container" class="language-python"></pre>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/components/prism-python.min.js"></script>

<script>
    // Fetch code from GitHub raw URL
    fetch('https://raw.githubusercontent.com/Hugoverissimo21/University-Projects/main/Py%20code_graphs.py')
        .then(response => response.text())
        .then(code => {
            // Insert code into the pre tag
            document.getElementById('code-container').textContent = code;
            // Apply syntax highlighting
            Prism.highlightElement(document.getElementById('code-container'));
        })
        .catch(error => {
            console.error('Error fetching code:', error);
        });
</script>

</body>
</html>
